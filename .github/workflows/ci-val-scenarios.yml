name: ci / val-scenarios

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/ci-val-scenarios.yml
      - misc/val-scenarios/**
      - contribs/gnogenesis/**
      - examples/**
      - Dockerfile
      - gno.land/**
      - gnovm/**
      - tm2/**
      - go.mod
      - go.sum
  pull_request:
    paths:
      - .github/workflows/ci-val-scenarios.yml
      - misc/val-scenarios/**
      - contribs/gnogenesis/**
      - examples/**
      - Dockerfile
      - gno.land/**
      - gnovm/**
      - tm2/**
      - go.mod
      - go.sum
  workflow_dispatch:

concurrency:
  group: val-scenarios-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  list-scenarios:
    name: list scenarios
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Build scenario matrix
        id: list
        run: |
          matrix=$(ls misc/val-scenarios/scenarios/*.sh | sort | xargs -n1 basename | \
            jq -R '{"script": ., "name": ("scenario-" + (.[:-3] | gsub("_"; "-")))}' | \
            jq -sc '.')
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build-images:
    name: build docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build gnoland image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: gnoland
          tags: gnoland:local
          load: true
          cache-from: type=gha,scope=val-scenarios-gnoland
          cache-to: type=gha,mode=max,scope=val-scenarios-gnoland

      - name: Build gnokey image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: gnokey
          tags: gnokey:local
          load: true
          cache-from: type=gha,scope=val-scenarios-gnokey
          cache-to: type=gha,mode=max,scope=val-scenarios-gnokey

      - name: Build gnogenesis image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: gnocontribs
          tags: gnogenesis:local
          load: true
          cache-from: type=gha,scope=val-scenarios-gnocontribs
          cache-to: type=gha,mode=max,scope=val-scenarios-gnocontribs

      - name: Save images
        run: docker save gnoland:local gnokey:local gnogenesis:local | gzip > /tmp/val-scenario-images.tar.gz

      - name: Upload images artifact
        uses: actions/upload-artifact@v4
        with:
          name: val-scenario-images
          path: /tmp/val-scenario-images.tar.gz
          retention-days: 1

  run-scenarios:
    name: ${{ matrix.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-images, list-scenarios]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.list-scenarios.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Download images artifact
        uses: actions/download-artifact@v4
        with:
          name: val-scenario-images
          path: /tmp

      - name: Load Docker images
        run: docker load < /tmp/val-scenario-images.tar.gz

      - name: Run ${{ matrix.name }}
        env:
          IMAGE_NAME: gnoland:local
          GNOKEY_IMAGE: gnokey:local
          GNOGENESIS_IMAGE: gnogenesis:local
          GNO_ROOT: ${{ github.workspace }}
          WORK_ROOT: /tmp/gno-val-tests
        run: bash misc/val-scenarios/scenarios/${{ matrix.script }}

      - name: Upload scenario logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.name }}
          path: /tmp/gno-val-tests/${{ matrix.name }}/logs/
          if-no-files-found: ignore
          retention-days: 1
